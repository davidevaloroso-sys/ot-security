name: CI-CD K3s OT

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/davidevaloroso-sys/ot-security

jobs:
  test_sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: |
          chmod +x scripts/run_tests.sh
          ./scripts/run_tests.sh

      - name: Run SAST (bandit)
        run: |
          chmod +x scripts/run_sast.sh
          ./scripts/run_sast.sh

  build_and_scan:
    runs-on: ubuntu-latest
    needs: test_sast
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build consumer image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Build raspi simulator image
        run: |
          docker build -f IA-integration/raspi-simulator/Dockerfile -t $IMAGE_NAME:raspi-simulator-${{ github.sha }} ./IA-integration/raspi-simulator

      - name: Build IA consumer image
        run: |
          docker build -f IA-integration/ia-consumer/Dockerfile -t $IMAGE_NAME:ia-consumer-${{ github.sha }} ./IA-integration/ia-consumer

      - name: Push consumer image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Push raspi simulator image
        run: |
          docker push $IMAGE_NAME:raspi-simulator-${{ github.sha }}

      - name: Push IA consumer image
        run: |
          docker push $IMAGE_NAME:ia-consumer-${{ github.sha }}

      - name: Install Trivy CLI
        uses: ankurk91/install-trivy-cli-action@v2
        with:
          version: 'latest'
          cache: true

      - name: Run Trivy vulnerability scanner on consumer
        run: |
          trivy image --exit-code 1 \
          --severity CRITICAL \
          --ignore-unfixed \
          --vuln-type os,library \
          $IMAGE_NAME:${{ github.sha }}

      - name: Run Trivy vulnerability scanner on raspi simulator
        run: |
          trivy image --exit-code 1 \
          --severity CRITICAL \
          --ignore-unfixed \
          --vuln-type os,library \
          $IMAGE_NAME:raspi-simulator-${{ github.sha }}

      - name: Run Trivy vulnerability scanner on IA consumer
        run: |
          trivy image --exit-code 1 \
          --severity CRITICAL \
          --ignore-unfixed \
          --vuln-type os,library \
          $IMAGE_NAME:ia-consumer-${{ github.sha }}

  deploy_k3s:
    runs-on: ubuntu-latest
    needs: build_and_scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Install kubectl
        run: |
          sudo apt-get update
          sudo apt-get install -y kubectl

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard

      - name: Configure WireGuard client
        run: |
          sudo mkdir -p /etc/wireguard
          sudo bash -c 'cat > /etc/wireguard/wg0.conf' << EOF
          [Interface]
          Address = 10.6.0.2/32
          PrivateKey = ${{ secrets.WG_CLIENT_PRIVATE_KEY }}

          [Peer]
          PublicKey = ${{ secrets.WG_SERVER_PUBLIC_KEY }}
          Endpoint = ${{ secrets.WG_ENDPOINT }}
          AllowedIPs = 192.168.1.21/32,10.42.0.0/16,10.43.0.0/16
          PersistentKeepalive = 25
          EOF

      - name: Bring up WireGuard
        run: |
          sudo wg-quick up wg0
          ip addr show wg0
          sudo wg show

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update consumer deployment image
        run: |
          chmod +x scripts/update_image_tag.sh
          ./scripts/update_image_tag.sh $IMAGE_NAME:${{ github.sha }}
          cat k3s/ot-consumer-deploy.yaml

      - name: Update raspi simulator deployment image
        run: |
          yq -i '.spec.template.spec.containers[0].image = env(IMAGE)' k3s/raspi-simulator-deploy.yaml
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:raspi-simulator-${{ github.sha }}

      - name: Update IA consumer deployment image
        run: |
          yq -i '.spec.template.spec.containers[0].image = env(IMAGE)' k3s/ia-consumer-deploy.yaml
        env:
          IMAGE: ${{ env.IMAGE_NAME }}:ia-consumer-${{ github.sha }}

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k3s/ot-consumer-deploy.yaml -n ot-namespace
          kubectl apply -f k3s/raspi-simulator-deploy.yaml -n ot-namespace
          kubectl apply -f k3s/ia-consumer-deploy.yaml -n ot-namespace

      - name: Check rollout status consumer
        run: |
          kubectl rollout status deployment/ot-mqtt-consumer -n ot-namespace --timeout=60s

      - name: Check rollout status raspi simulator
        run: |
          kubectl rollout status deployment/raspi-simulator -n ot-namespace --timeout=60s

      - name: Check rollout status IA consumer
        run: |
          kubectl rollout status deployment/ia-consumer -n ot-namespace --timeout=60s