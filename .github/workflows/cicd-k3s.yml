name: CI-CD K3s OT

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/davidevaloroso-sys/ot-security

jobs:
  test_sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: |
          chmod +x scripts/run_tests.sh
          ./scripts/run_tests.sh

      - name: Run SAST (bandit)
        run: |
          chmod +x scripts/run_sast.sh
          ./scripts/run_sast.sh

  build_and_scan:
    runs-on: ubuntu-latest
    needs: test_sast
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME:${{ github.sha }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy_k3s:
    runs-on: ubuntu-latest
    needs: build_and_scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Setup kubectl
        uses: actions-hub/kubectl@v1.31.0

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.K3S_KUBECONFIG }}" > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Update deployment image
        run: |
          chmod +x scripts/update_image_tag.sh
          ./scripts/update_image_tag.sh $IMAGE_NAME:${{ github.sha }}
          cat k3s/ot-consumer-deploy.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k3s/ot-consumer-deploy.yaml -n ot-namespace

      - name: Check rollout status
        run: |
          kubectl rollout status deployment/ot-mqtt-consumer -n ot-namespace --timeout=60s